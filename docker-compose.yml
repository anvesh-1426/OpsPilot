version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: opspilot-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: opspilot
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: opspilot-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/opspilot?schema=public
      JWT_SECRET: opspilot-production-super-secret-jwt-key-32-chars-min
      JWT_REFRESH_SECRET: opspilot-production-refresh-secret-key-32-chars-min
      CORS_ORIGINS: http://localhost,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: opspilot-frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  postgres_data:
